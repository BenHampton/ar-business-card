<!DOCTYPE html>
<html>
<head>
    <!-- A-Frame: the 3D/scene-graph layer (declarative HTML for 3D) -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- AR.js: use the NFT build (aframe-ar-nft.js). It supports BOTH
         preset markers (this step) AND image/NFT tracking (Step 04),
         so we won't have to swap scripts later. The plain aframe-ar.js
         does NOT include NFT — using it now would break Step 04. -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar-nft.js"></script>
    <script>
        window.addEventListener('arjs-nft-loaded', () => {
            console.log('NFT descriptors loaded');
            document.title = 'NFT READY';        // ⬅ CHANGED: visible proof it loaded
            document.querySelector('#loader')?.remove();
        });
    </script>

    <style>
        #hud {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; padding: 10px 18px; border-radius: 100px;
            background: rgba(0,0,0,0.65); color: #fff;
            font-family: system-ui, sans-serif; font-size: 15px;
        }
    </style>

    <style>
        #contact-fallback {
            position: fixed;
            left: 16px;
            z-index: 10;
            max-width: 80vw;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        }
        #contact-fallback a { color: #23e5c8; }
        #contact-fallback summary { cursor: pointer; }
    </style>

</head>
<body style="margin: 0; overflow: hidden">

    <div id="hud">Point your camera at the card</div>
    <details id="contact-fallback">
        <summary>Contact info (no AR needed)</summary>
        <p>Ben Hampton - Software Engineer </p>
<!--        <p><a href="mailto:test@example.com">test@test.com</a></p>-->
        <p><a href="https://linkedin.com/in/test">LinkedIn</a></p>
    </details>

    <!-- The scene. arjs config lives here. -->
    <a-scene
            embedded
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            vr-mode-ui="enabled: false;">

        <a-assets timeout="10000">
            <a-asset-item id="cardModel" src="assets/card-model.glb"></a-asset-item>
        </a-assets>

        <a-nft
                type="nft"
                url="assets/card"
                emitevents="true"
                smooth="true"
                smoothCount="10"
                smoothTolerance="0.01"
                smoothThreshold="5">

<!--             animation -> animate it: a slow hover-spin reads as "alive"-->
            <a-entity gltf-model="#cardModel"
                      position="50 100 0"
                      rotation="-90 0 0"
                      scale="100 100 100"
                      animation="property: rotation; to: -90 360 0;
                   dur: 8000; easing: linear; loop: true">
            </a-entity>

            <!-- content that appears on the card, e.g. the box for testing: -->
<!--            <a-box-->
<!--                    position="50 100 0"-->
<!--                    material="color: #23e5c8;"-->
<!--                    scale="100 100 100">-->
<!--            </a-box>-->
        </a-nft>

        <!-- The camera. In AR.js the camera pose is driven by the CV,
            so you just declare it — don't move it yourself. -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const hud = document.querySelector('#hud');

        // Events bubble to the scene - listen there, not on the marker node
        scene.addEventListener('markerFound', () => {
            hud.style.display = 'none'
        });

        scene.addEventListener('markerLost', () => {
            hud.textContent = 'Card lost - point back at it';
            hud.style.display = 'block';
        })

        // camera guards. Two distinct failures - the API is missing, or the user DENIES the prompt.
        scene.addEventListener('arjs-video-loaded',  () => {
            console.log('Camera stream OK')
        });

        if ( !navigator.mediaDevices?.getUserMedia) {
            showFatal('This browser can\'t access the camera. Try Chrome or Safari.')
        } else {
            // Probe the camera ourselves; the browser caches the grant,
            // so AR.js's own request reuses it (no double prompt).
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => stream.getTracks().forEach(t => t.stop()))
                .catch(err => {
                    if (err.name === 'NotAllowedError') {
                        showFatal('Camera access was denied. Allow camera ' +
                            'permission in your browser settings, then reload.');
                    } else {
                        showFatal('No usable camera found (' + err.name + ').');
                    }
                });
        }

        function showFatal(message) {
            // Replace everything with a legible, centered message -
            // inline styles because we've wiped the DOM.
            document.body.innerHTML =
                `<div style="position:fixed; inset:0; display:flex;
                  align-items:center; justify-content:center; padding:24px;
                  background:#0a0d0f; color:#fff; text-align:center;
                  font-family:system-ui,sans-serif; font-size:18px;
                  line-height:1.5;">${message}</div>`;
        }

        // respect prefers-reduced-motion by stripping the spin
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.querySelector('[gltf-model]')?.removeAttribute('animation');
        }
    </script>
</body>
</html>

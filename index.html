<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ar-business-card</title>

    <!-- vendor/ is a URL, not a folder — viteStaticCopy emits these from node_modules into dev and dist/. -->
    <script src="vendor/aframe.min.js"></script>
    <script src="vendor/aframe-ar-nft.js"></script>


    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>

    <div id="loader">Loading…</div>
    <div id="hud">Point your camera at the card</div>

    <details id="contact-fallback">
      <summary>Contact info (no AR needed)</summary>
      <p>Ben Hampton — Consultant, K2 Technology Consulting</p>
      <p><a href="mailto:ben@example.com">ben@example.com</a></p>
      <p><a href="https://linkedin.com/in/example">LinkedIn</a></p>
    </details>

    <a-scene
            embedded
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            vr-mode-ui="enabled: false">

      <a-assets timeout="10000">
        <a-asset-item id="cardModel" src="assets/card-model.glb"></a-asset-item>
        <a-asset-item id="trexModel" src="assets/trex-model.glb"></a-asset-item>
      </a-assets>

          <!-- Test Block -->
<!--      <a-marker preset="hiro">-->
<!--        <a-box position="0 0.5 0" material="color: #23e5c8;" scale="1 1 1"></a-box>-->
<!--      </a-marker>-->

<!--      <a-nft-->
<!--              type="nft"-->
<!--              url="ar-business-card/assets/card"-->
<!--              smooth="false">-->
<!--&lt;!&ndash;        <a-box position="50 100 0" material="color: #23e5c8;" scale="100 100 100"></a-box>&ndash;&gt;-->
<!--        <a-entity-->
<!--                gltf-model="#cardModel"-->
<!--                position="50 100 0"-->
<!--                rotation="-90 0 0"-->
<!--                scale="1 1 1"-->
<!--                animation="property: rotation; to: -90 360 0; dur: 8000; easing: linear; loop: true">-->
<!--        </a-entity>-->
<!--      </a-nft>-->

      <a-nft
              type="nft"
              url="ar-business-card/assets/trex/trex"
              smooth="false">
        <a-entity
                gltf-model="#trexModel"
                position="50 100 0"
                rotation="0 0 0"
                scale="1 1 1"
                animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true">
        </a-entity>
      </a-nft>

      <!-- In AR.js the camera pose is driven by the CV solver. Declare it - never move it yourself. -->
      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>
